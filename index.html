<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%SEO_TITLE%</title>
    <script>
      (() => {
        const STORAGE_KEY = "interactive-cv-theme";
        const savedTheme = window.localStorage.getItem(STORAGE_KEY);
        const theme = savedTheme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.add(`theme-${theme}`);
      })();
    </script>
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body class="theme-dark">
    <main class="sr-only" id="static-profile">
      <h1>Lukasz Komur</h1>
      <p>Software Engineer / Senior Backend Engineer / Solution Architect</p>
      <p>This build-time placeholder is replaced with the full static profile from src/data/cv.json.</p>
    </main>
    <div id="root"></div>
    <noscript>
      <main>
        <h1>Lukasz Komur</h1>
        <p>
          Software Engineer / Senior Backend Engineer / Solution Architect
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
