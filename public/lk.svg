<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 239" role="img" aria-labelledby="title desc">
  <title id="title">LK horned emblem</title>
  <desc id="desc">Vector recreation of a gold angular LK-style horned emblem based on the provided reference image.</desc>
  <defs>
    <linearGradient id="gold" x1="40" y1="20" x2="290" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f1d49c"/>
      <stop offset="0.45" stop-color="#d8b274"/>
      <stop offset="1" stop-color="#b8894d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <style>
      .mark{fill:url(#gold);filter:url(#softShadow)}
    </style>
  </defs>

  <!-- left upper horn -->
  <path class="mark" d="M11 14
    C22 48 45 74 82 88
    L82 114
    C48 102 23 79 8 47
    C5 36 5 24 11 14 Z"/>

  <!-- right upper horn -->
  <path class="mark" d="M319 14
    C308 48 285 74 248 88
    L248 114
    C282 102 307 79 322 47
    C325 36 325 24 319 14 Z"/>

  <!-- left lower blade / horn -->
  <path class="mark" d="M18 113
    C45 132 76 143 111 147
    L107 166
    C72 161 42 145 18 113 Z"/>

  <!-- right lower blade / horn -->
  <path class="mark" d="M312 113
    C285 132 254 143 219 147
    L223 166
    C258 161 288 145 312 113 Z"/>

  <!-- left outer vertical plate -->
  <path class="mark" d="M47 82 L78 94 L78 170 L50 154 Z"/>

  <!-- right outer vertical plate -->
  <path class="mark" d="M283 82 L252 94 L252 170 L280 154 Z"/>

  <!-- central left tall plate -->
  <path class="mark" d="M107 36 L130 20 L130 139 L107 123 Z"/>

  <!-- central middle tall plate -->
  <path class="mark" d="M143 20 L166 9 L166 159 L143 145 Z"/>

  <!-- central right tall plate -->
  <path class="mark" d="M180 9 L203 20 L203 102 L180 123 Z"/>

  <!-- left angular body / L stroke -->
  <path class="mark" d="M91 72 L118 49 L118 146 L168 176 L168 209 L91 160 Z"/>

  <!-- right angular K upper arm -->
  <path class="mark" d="M210 42 L234 58 L234 108 L210 129 Z"/>

  <!-- right angular K diagonal main -->
  <path class="mark" d="M181 132 L244 83 L244 119 L203 154 L253 185 L216 185 L181 161 Z"/>

  <!-- bottom shield / chevron -->
  <path class="mark" d="M89 163 L165 214 L241 163 L241 190 L165 234 L89 190 Z"/>

  <!-- central lower split plate -->
  <path class="mark" d="M147 169 L165 181 L183 169 L183 213 L165 224 L147 213 Z"/>
</svg>
